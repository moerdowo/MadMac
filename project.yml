name: MadMac
options:
  bundleIdPrefix: com.moerdowo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
targets:
  MadMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
          - "Resources/**"
      - path: Sources/Resources/Fonts
        buildPhase: resources
      - path: Sources/Resources/AppIcon.icns
        buildPhase: resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moerdowo.MadMac
        PRODUCT_NAME: MadMac
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 moerdowo"
        INFOPLIST_KEY_CFBundleDisplayName: MadMac
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Sources/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        ATSApplicationFontsPath: Fonts
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
